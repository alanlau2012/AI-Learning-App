<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 背景：暖纸色，design.md 唯一视觉基线 -->
  <rect width="512" height="512" rx="96" fill="#FAF9F6"/>
  <!-- 蓝色描边 -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="#1F40D8" stroke-width="8"/>

  <!-- A 字母：无衬线、几何感 -->
  <g fill="#1F40D8">
    <polygon points="206,150 130,372 168,372 184,322 228,322 244,372 282,372 206,150"/>
    <rect x="190" y="294" width="32" height="6"/>
  </g>

  <!-- I 字母：带上下衬线，呼应 serif/mono 字体气质 -->
  <g fill="#1F40D8">
    <rect x="294" y="150" width="80" height="20"/>
    <rect x="310" y="170" width="48" height="182"/>
    <rect x="294" y="352" width="80" height="20"/>
  </g>

  <!-- 底部"工程基础"线，绿色（design.md 进度色） -->
  <rect x="130" y="404" width="252" height="8" rx="4" fill="#2E7D58"/>
</svg>
